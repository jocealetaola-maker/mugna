<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#241a15" />
<title>Mugnâ · Loyalty</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--paper:#f3ede1;--card:#fffdf8;--ink:#241a15;--bean:#6b4a35;--sun:#d35e2a;--sun-deep:#b54a1c;--sage:#5e7350;--line:#e2d4bd;--ui:'Hanken Grotesk',system-ui,sans-serif;--disp:'Fraunces',Georgia,serif;}
*{box-sizing:border-box}
body{margin:0;font-family:var(--ui);color:var(--ink);background:radial-gradient(120% 80% at 50% -10%,#2f221b,#241a15 60%);min-height:100dvh}
.wrap{max-width:460px;margin:0 auto;padding:30px 18px}
.mark{width:72px;height:72px;margin:6px auto 10px;background:var(--paper);border-radius:18px;display:grid;place-items:center;overflow:hidden}
.mark svg{width:78%;height:78%}
h1{font-family:var(--disp);font-weight:600;color:var(--paper);text-align:center;margin:0;font-size:28px}
.sub{color:#cbb89f;text-align:center;font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin:2px 0 22px}
.card{background:var(--card);border-radius:18px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.inp{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--paper);font-size:16px;font-family:var(--ui)}
.inp:focus{outline:none;border-color:var(--sun);box-shadow:0 0 0 3px rgba(211,94,42,.18)}
.btn{width:100%;border:none;background:var(--sun);color:#fff;font-weight:700;border-radius:12px;padding:14px;font-size:16px;margin-top:12px;font-family:var(--ui)}
.btn:disabled{opacity:.5}
.stamps{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:18px 0}
.stamp{aspect-ratio:1;border-radius:50%;border:2px dashed var(--line);display:grid;place-items:center;font-size:22px;color:#cbb89f}
.stamp.on{border:2px solid var(--sun);background:#fdeee4;color:var(--sun)}
.muted{color:var(--bean)}.center{text-align:center}
.big{font-family:var(--disp);font-size:30px;font-weight:600;text-align:center}
.reward{background:var(--sun);color:#fff;border-radius:14px;padding:16px;text-align:center;font-weight:700;margin-top:6px}
.back{display:block;text-align:center;color:#cbb89f;margin-top:18px;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark" id="mark"></div>
  <h1>Mugnâ Loyalty</h1>
  <div class="sub">10 cups = 1 free drink</div>
  <div class="card" id="card">
    <label style="font-size:13px;font-weight:600;color:var(--bean)">Enter your mobile number</label>
    <input class="inp" id="phone" type="tel" inputmode="tel" placeholder="0917..." style="margin-top:8px">
    <button class="btn" id="go">Check my cups</button>
    <p class="muted center" style="font-size:12.5px;margin:14px 0 0">Cups are added by our staff each time you buy. New here? Your card starts on your first purchase. ☕</p>
  </div>
  <a class="back" href="order.html">← Order ahead</a>
</div>
<script>
/* ===== CONFIG — same values as index.html ===== */
const SUPABASE_URL  = "https://vnztvasfojliizflrnix.supabase.co/rest/v1/";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZuenR2YXNmb2psaWl6Zmxybml4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDQ4NjAsImV4cCI6MjA5NjkyMDg2MH0.ec2qhBYO58i9Zcmuk9tmZ4faf8epc0UebP8GKnENuGM";
/* ============================================== */
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const $=s=>document.querySelector(s);
$("#mark").innerHTML=(()=>{const cx=50,cy=60,R=15,n=13;let r="";for(let i=0;i<n;i++){const a=Math.PI*(i/(n-1)),dx=Math.cos(a),dy=-Math.sin(a),ri=R+4,ln=i%2?11.5:17,ro=ri+ln;r+=`<line x1="${(cx+ri*dx).toFixed(1)}" y1="${(cy+ri*dy).toFixed(1)}" x2="${(cx+ro*dx).toFixed(1)}" y2="${(cy+ro*dy).toFixed(1)}" stroke="#211a15" stroke-width="3.1" stroke-linecap="round"/>`;}return `<svg viewBox="0 0 100 80"><g>${r}</g><path d="M${cx-R},${cy} A${R},${R} 0 0 1 ${cx+R},${cy} Z" fill="#d35e2a"/></svg>`;})();

async function check(){
  const phone=$("#phone").value.trim();
  if(!phone){return;}
  const btn=$("#go"); btn.disabled=true; btn.textContent="Checking…";
  try{
    const {data,error}=await sb.rpc("loyalty_lookup",{p_phone:phone});
    if(error)throw error;
    const row=(data&&data[0])||null;
    show(phone,row);
  }catch(e){ btn.disabled=false; btn.textContent="Check my cups"; alert("Hmm, couldn't check that — "+e.message); }
}
function show(phone,row){
  const cups=row?row.cups:0, name=row?row.name:"", ready=row?row.reward_ready:false, redeemed=row?row.rewards_redeemed:0;
  const card=$("#card"); card.innerHTML="";
  if(name){const h=document.createElement("div");h.className="big";h.textContent="Hi, "+name+"!";card.append(h);}
  const count=document.createElement("div");count.className="center muted";count.style.marginTop="4px";
  count.textContent = ready? "Your card is full!" : `${cups} of 10 cups · ${10-cups} to go`;
  card.append(count);
  const grid=document.createElement("div");grid.className="stamps";
  for(let i=0;i<10;i++){const s=document.createElement("div");s.className="stamp"+(i<cups?" on":"");s.textContent=i<cups?"☕":"";grid.append(s);}
  card.append(grid);
  if(ready){const r=document.createElement("div");r.className="reward";r.textContent="🎉 Free drink unlocked! Show this to our staff.";card.append(r);}
  if(redeemed>0){const d=document.createElement("div");d.className="muted center";d.style.fontSize="12.5px";d.style.marginTop="10px";d.textContent=`Free drinks enjoyed so far: ${redeemed} 💛`;card.append(d);}
  const again=document.createElement("button");again.className="btn";again.style.background="var(--paper-2)";again.style.color="var(--ink)";again.textContent="Check another number";again.onclick=()=>location.reload();
  card.append(again);
}
$("#go").addEventListener("click",check);
$("#phone").addEventListener("keydown",e=>{if(e.key==="Enter")check();});
</script>
</body>
</html>
